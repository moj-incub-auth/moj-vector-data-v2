apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: build-search-app-piperun-
spec:
  pipelineRef:
    name: build-search-app-pipeline
  serviceAccountName: pipeline 
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 40Gi