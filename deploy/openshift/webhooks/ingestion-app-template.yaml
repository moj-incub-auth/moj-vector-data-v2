apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: ingestion-ai-app-template
spec:
  params:
    - name: gitrevision
    - name: gitrepositoryurl
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: webhook-ingestion-ai-build-piperun-
      spec:
          pipelineRef: 
            name: build-app-pipeline
          serviceAccountName: pipeline 
          params:
            # the URL of the GIT repo containing the source data to ingest
            - name: GIT_URL
              value: "https://github.com/moj-incub-auth/moj-vector-data-v2.git"
            - name: GIT_BRANCH
              value: "main"
            - name: IMAGE_REFERENCE
              value: "image-registry.openshift-image-registry.svc:5000/moj-vector-data/ingest-app-ai:latest"
            - name: CONTAINERFILE
              value: "./Containerfile.ingest-ai-app"
          workspaces:
            - name: shared-data
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 40Gi
            - name: docker-credentials  
              secret:
                secretName: pipeline-pull-push-auth
                items:
                  - key: .dockerconfigjson
                    path: config.json
