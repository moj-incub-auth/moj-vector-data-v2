apiVersion: triggers.tekton.dev/v1alpha1
kind: TriggerTemplate
metadata:
  name: nhs-design-template
spec:
  params:
    - name: gitrevision
    - name: gitrepositoryurl
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: webhook-ingest-nhs-design-piperun-
      spec:
          pipelineRef: 
            name: ingest-content-ai-pipeline
          params:
            # the URL of the GIT repo containing the source data to ingest
            - name: RESOURCE_GIT_URL
              value: "https://github.com/moj-incub-auth/nhsuk-service-manual.git"
            - name: RESOURCE_GIT_BRANCH
              value: "main"
            - name: MILVUS_HOST
              value: "moj-milvus.moj-vector-data.svc.cluster.local"
            - name: RESOURCE_SUBDIRECTORY
              value: "nhsuk-service-manual"
            - name: OPENAI_BASE_URL
              value: "http://qwen3-14b-llm-metrics.vllm-serving.svc.cluster.local:8080/v1"
          workspaces:
            - name: shared-data
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 40Gi
