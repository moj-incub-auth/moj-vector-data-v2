version: '3.5'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd:Z
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data:Z
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
  text-embeddings-inference:
    container_name: tei
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    #image: ghcr.io/huggingface/text-embeddings-inference:cpu-ipex-latest
    ports:
      - "18080:18080"
    environment:
      - HUGGINGFACE_HUB_CACHE=/data
      - USE_FLASH_ATTENTION=True
      - HOSTNAME=0.0.0.0
      - PORT=18080
      - TRUST_REMOTE_CODE=True
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/tei:/data:Z
    command: --model-id ${MILVUS_EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18080/health"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 100
  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.12
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    configs:
      - source: user.yaml
        target: /milvus/configs/user.yaml
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus:Z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
      text-embeddings-inference:
        condition: service_healthy

configs:
  user.yaml:
    content: |+
      credential:
        openai_key:
          apikey: empty
      function:
        textEmbedding:
          providers:
            openai:
              url: http://tei:18080/v1/embeddings
              credential: openai_key

networks:
  default:
    name: milvus